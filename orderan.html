<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Orderan - neth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2 class="logo">neth.</h2>
            <nav>
                <a href="index.html" class="nav-btn" style="text-decoration:none;">Dashboard</a>
                <a href="orderan.html" class="nav-btn active" style="text-decoration:none;">Data Orderan</a>
            </nav>
        </aside>

        <main class="main-content">
            <section id="view-orders">
                <header class="order-header">
                    <h1>Manajemen Orderan</h1>
                    <button type="button" class="btn-primary" onclick="openModal()">+ Create Order</button>
                </header>

                <div class="toolbar card">
                    <input type="text" id="searchInput" placeholder="Cari nama atau ID..." onkeyup="filterTable()">
                    <select id="statusFilter" onchange="filterTable()">
                        <option value="ALL">Semua Status</option>
                        <option value="SELESAI">Selesai</option>
                        <option value="PROSES">Proses</option>
                        <option value="PENDING">Pending</option>
                        <option value="CANCEL">Cancel</option>
                    </select>
                </div>

                <div class="table-container card">
                    <table id="orderTable">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAll"></th>
                                <th>ID Order</th>
                                <th>Nama Produk</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="6" style="text-align:center;">Loading data dari Google Sheets...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2>Tambah Order Baru</h2>
            <form id="orderForm">
                <input type="hidden" id="formAction" value="aktif">
                <input type="hidden" id="formId" value="">
                <input type="text" id="formProduk" placeholder="Nama Produk" required> 
                <select id="formStatus">
                    <option value="PENDING">Pending</option>
                    <option value="PROSES">Proses</option>
                    <option value="SELESAI">Selesai</option>
                    <option value="CANCEL">Cancel</option>
                </select>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan ke Sheets</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
